<section class="hero" id="home">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>

  <p class="hero-eyebrow">June 11 – July 19, 2026</p>

  <h1 class="hero-title">
    <span>FIFA World Cup <span class="hero-year">2026</span></span>
  </h1>

  <p class="hero-sub">
    <span>USA</span>•<span>Mexico</span>•<span>Canada</span>
  </p>

  <div class="countdown-wrap">
    <p class="countdown-label">Tournament begins in</p>
    <div class="countdown" id="countdown">
      <div class="cd-unit">
        <span class="cd-num" id="cd-days">00</span>
        <span class="cd-label">Days</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cd-hours">00</span>
        <span class="cd-label">Hours</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cd-minutes">00</span>
        <span class="cd-label">Minutes</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cd-seconds">00</span>
        <span class="cd-label">Seconds</span>
      </div>
    </div>
  </div>

  <div class="hero-ctas">
    <a href="#schedule" class="btn btn-primary">View Schedule</a>
    <a href="#predictor" class="btn btn-outline">Pick Your Winner</a>
    <button class="btn btn-fb" onclick="shareFacebook()">Share on Facebook</button>
  </div>
</section>
